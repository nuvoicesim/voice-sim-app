version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - cd amplify && npm ci --cache .npm --prefer-offline
        - cd .. && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - curl -sL https://github.com/git-lfs/git-lfs/releases/download/v3.7.1/git-lfs-linux-amd64-v3.7.1.tar.gz -o /tmp/git-lfs.tar.gz
        - mkdir -p /tmp/git-lfs && tar xzf /tmp/git-lfs.tar.gz -C /tmp/git-lfs
        - /tmp/git-lfs/git-lfs-3.7.1/install.sh
        - git lfs pull
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'   
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - amplify/node_modules/**/*